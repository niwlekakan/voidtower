name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend (clippy + test)
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Clippy
        working-directory: backend
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        working-directory: backend
        run: cargo test --all-features

  supply-chain:
    name: Supply chain (cargo-deny + cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      # cargo-audit is installed with `cargo install` (not the rustsec/audit-check
      # action) because this repo's crate lives in `backend/`, not the repo root
      # (no root Cargo.toml/Cargo.lock) — invoking cargo directly with
      # `working-directory: backend` matches how the `backend` job above already
      # runs clippy/test against this non-root layout, instead of depending on a
      # marketplace action's assumptions about where the lockfile lives.
      - name: Install cargo-deny and cargo-audit
        run: cargo install --locked cargo-deny cargo-audit
      - name: cargo deny check
        working-directory: backend
        run: cargo deny check
      # Advisories already present in the dependency tree at baseline time are
      # ignored by ID in backend/deny.toml's [advisories.ignore] (cargo-deny) and
      # via --ignore flags below (cargo-audit); either fix requires a
      # dependency-tree change out of this job's scope, or no fix is available
      # upstream yet. Any NEW advisory not in this list still fails the job.
      - name: cargo audit
        working-directory: backend
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0204 \
            --ignore RUSTSEC-2026-0185 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2024-0363

  mutation-testing:
    name: Mutation testing (policy + voidwatch)
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --version 27.1.0 --locked
      # Scoped to the security boundary only (ADR-005 constraint 3 / gap-analysis P1
      # row 1) — not the whole crate, which would be prohibitively slow. Runs on
      # every push/PR to main rather than path-filtering to just these files: with
      # only 6 files and 63 mutants the fixed cost is minutes, not an amount worth
      # the extra complexity/brittleness of a job-level paths-filter step (workflow-
      # level `on.pull_request.paths` isn't an option here since it would gate the
      # `frontend`/`backend` jobs too, which ADR-005 constraint 1 forbids touching).
      - name: cargo mutants (policy.rs + voidwatch/**)
        working-directory: backend
        run: cargo mutants --no-shuffle --all-features --file src/policy.rs --file 'src/voidwatch/**/*.rs'
