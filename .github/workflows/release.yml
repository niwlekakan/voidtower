name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          key: ${{ matrix.target }}

      - name: Build backend
        working-directory: backend
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCH="${{ matrix.target }}"
          ARCHIVE="voidtower-${VERSION}-${ARCH%%-*}-unknown-linux-musl.tar.gz"
          mkdir -p pkg
          cp backend/target/${{ matrix.target }}/release/voidtower pkg/
          cp -r frontend/dist pkg/frontend
          tar -czf "$ARCHIVE" -C pkg .
          sha256sum "$ARCHIVE" >> SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            voidtower-*.tar.gz
            SHA256SUMS

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Merge checksums
        run: cat artifacts/SHA256SUMS | sort -u > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/voidtower-*.tar.gz
            SHA256SUMS
          generate_release_notes: true
