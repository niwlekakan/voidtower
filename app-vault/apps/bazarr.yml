id: bazarr
name: Bazarr
description: Subtitle manager for Sonarr and Radarr — automatically downloads subtitles from multiple providers
category: downloads
version_hint: "latest"
compose:
  services:
    bazarr:
      image: lscr.io/linuxserver/bazarr:latest
      restart: unless-stopped
      ports:
        - "6767:6767"
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=Etc/UTC
        - VIRTUAL_HOST=bazarr.local
        - VIRTUAL_PORT=6767
      volumes:
        - bazarr_config:/config
        - /media/tv:/tv
        - /media/movies:/movies
      networks:
        default: {}
        vt-proxy:
          aliases:
            - bazarr
  volumes:
    bazarr_config:

  networks:
    vt-proxy:
      external: true

web_port: 6767
links:
  home: https://www.bazarr.media
  docs: https://wiki.bazarr.media
