id: changedetection
name: Changedetection.io
description: Website change detection and restock monitoring
category: monitoring
icon: ""
version_hint: "latest"
compose:
  services:
    changedetection:
      image: ghcr.io/dgtlmoon/changedetection.io:latest
      restart: unless-stopped
      ports:
        - "5000:5000"
      volumes:
        - changedetection_data:/datastore
      environment:
        - VIRTUAL_HOST=changedetection.local
        - VIRTUAL_PORT=5000
      networks:
        default: {}
        vt-proxy:
          aliases:
            - changedetection
  volumes:
    changedetection_data:

  networks:
    vt-proxy:
      external: true

links:
  home: https://changedetection.io
  docs: https://github.com/dgtlmoon/changedetection.io/wiki
