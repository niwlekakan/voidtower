id: code-server
name: code-server
description: VS Code in the browser — full IDE accessible from any device
category: dev
version_hint: "latest"
compose:
  services:
    code-server:
      image: lscr.io/linuxserver/code-server:latest
      restart: unless-stopped
      ports:
        - "8444:8443"
      volumes:
        - code_server_config:/config
        - ${HOME}:/home/coder:rw
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=UTC
        - PASSWORD=${CODE_SERVER_PASSWORD}
        - SUDO_PASSWORD=${CODE_SERVER_SUDO_PASSWORD}
        - VIRTUAL_HOST=code.local
        - VIRTUAL_PORT=8443
      networks:
        default: {}
        vt-proxy:
          aliases:
            - code-server
  volumes:
    code_server_config:

  networks:
    vt-proxy:
      external: true

ai_integration:
  level: native
  description: "Odysseus can open files, run terminal commands, and manage the workspace"
links:
  home: https://coder.com/docs/code-server
  docs: https://coder.com/docs/code-server/latest
