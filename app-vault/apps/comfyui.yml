id: comfyui
name: ComfyUI
description: Node-based Stable Diffusion UI for local AI image generation
category: ai
version_hint: "latest"
compose:
  services:
    comfyui:
      image: ghcr.io/radiatingreverberations/comfyui-extensions:latest
      restart: unless-stopped
      ports:
        - "8188:8188"
      volumes:
        - comfyui_models:/comfyui/models
        - comfyui_user:/comfyui/user
        - comfyui_output:/comfyui/output
      environment:
        - VIRTUAL_HOST=comfyui.local
        - VIRTUAL_PORT=8188
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      networks:
        default: {}
        vt-proxy:
          aliases:
            - comfyui
  volumes:
    comfyui_models:
    comfyui_user:
    comfyui_output:

  networks:
    vt-proxy:
      external: true

ai_integration:
  level: native
  description: "Odysseus can generate images, queue prompts, and read generation history"
links:
  home: https://github.com/comfyanonymous/ComfyUI
  docs: https://docs.comfy.org
