id: comfyui
name: ComfyUI
description: Node-based Stable Diffusion UI for local AI image generation
category: ai
version_hint: "latest"
compose:
  services:
    comfyui:
      image: yanwk/comfyui-boot:latest
      restart: unless-stopped
      ports:
        - "8188:8188"
      volumes:
        - comfyui_data:/root
        - ${HOME}/.local/share/voidtower/models:/vt-models:ro
      runtime: nvidia
      environment:
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=compute,utility
        - VIRTUAL_HOST=comfyui.local
        - VIRTUAL_PORT=8188
      devices:
        - /dev/dri:/dev/dri
      networks:
        default: {}
        vt-proxy:
          aliases:
            - comfyui
  volumes:
    comfyui_data:

  networks:
    vt-proxy:
      external: true

ai_integration:
  level: native
  description: "Odysseus can generate images, queue prompts, and read generation history"
links:
  home: https://github.com/comfyanonymous/ComfyUI
  docs: https://docs.comfy.org
