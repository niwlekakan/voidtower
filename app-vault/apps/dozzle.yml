id: dozzle
name: Dozzle
description: Real-time Docker container log viewer
category: monitoring
icon: ""
version_hint: "latest"
compose:
  services:
    dozzle:
      image: amir20/dozzle:latest
      restart: unless-stopped
      ports:
        - "8889:8080"
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock:ro
      environment:
        - VIRTUAL_HOST=dozzle.local
        - VIRTUAL_PORT=8080
      networks:
        default: {}
        vt-proxy:
          aliases:
            - dozzle

  networks:
    vt-proxy:
      external: true

links:
  home: https://dozzle.dev
  docs: https://dozzle.dev/guide
