id: gitea
name: Gitea
description: Self-hosted Git service
category: dev
icon: https://gitea.io/images/gitea.png
version_hint: "latest"
compose:
  services:
    gitea:
      image: gitea/gitea:latest
      restart: unless-stopped
      ports:
        - "3002:3000"
        - "2222:22"
      volumes:
        - gitea_data:/data
      environment:
        - USER_UID=1000
        - USER_GID=1000
        - GITEA__security__SECRET_KEY=${GITEA_SECRET_KEY}
        - GITEA__security__INTERNAL_TOKEN=${GITEA_INTERNAL_TOKEN}
        - VIRTUAL_HOST=gitea.local
        - VIRTUAL_PORT=3000
      networks:
        default: {}
        vt-proxy:
          aliases:
            - gitea
  volumes:
    gitea_data:

  networks:
    vt-proxy:
      external: true

required_env:
  - key: GITEA_SECRET_KEY
    description: "Gitea session and CSRF secret key (auto-generated)"
    generate: random_hex_64
  - key: GITEA_INTERNAL_TOKEN
    description: "Gitea internal API token (auto-generated)"
    generate: random_hex_64
ai_integration:
  level: native
  description: "Odysseus can manage repositories, issues, branches, and webhooks"
links:
  home: https://gitea.io
  docs: https://docs.gitea.com
