id: grafana
name: Grafana
description: Analytics and monitoring dashboards
category: monitoring
icon: ""
version_hint: "latest"
compose:
  services:
    grafana:
      image: grafana/grafana:latest
      restart: unless-stopped
      ports:
        - "3005:3000"
      volumes:
        - grafana_data:/var/lib/grafana
      environment:
        - GF_SECURITY_ADMIN_PASSWORD=changeme
        - GF_SERVER_ROOT_URL=http://grafana.local
        - VIRTUAL_HOST=grafana.local
        - VIRTUAL_PORT=3000
      networks:
        default: {}
        vt-proxy:
          aliases:
            - grafana
  volumes:
    grafana_data:
ai_integration:
  level: aware
  description: "Odysseus can read dashboard alerts and annotation history"
links:
  home: https://grafana.com
  docs: https://grafana.com/docs
