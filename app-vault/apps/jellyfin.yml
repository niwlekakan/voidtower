id: jellyfin
name: Jellyfin
description: Free software media server
category: media
version_hint: "latest"
compose:
  services:
    jellyfin:
      image: jellyfin/jellyfin:latest
      restart: unless-stopped
      ports:
        - "8096:8096"
      volumes:
        - jellyfin_config:/config
        - jellyfin_cache:/cache
        - /media:/media:ro
      environment:
        - VIRTUAL_HOST=jellyfin.local
        - VIRTUAL_PORT=8096
      networks:
        default: {}
        vt-proxy:
          aliases:
            - jellyfin
  volumes:
    jellyfin_config:
    jellyfin_cache:
ai_integration:
  level: aware
  description: "Odysseus can read library stats and active playback sessions"
links:
  home: https://jellyfin.org
  docs: https://jellyfin.org/docs
