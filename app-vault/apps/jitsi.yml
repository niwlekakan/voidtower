id: jitsi
name: Jitsi Meet
description: Self-hosted video conferencing — no account required, end-to-end encrypted
category: productivity
version_hint: "stable"
compose:
  services:
    jitsi-web:
      image: jitsi/web:stable
      restart: unless-stopped
      ports:
        - "8080:80"
        - "8443:443"
      volumes:
        - jitsi_web:/config
      environment:
        - PUBLIC_URL=http://localhost:8080
        - ENABLE_LETSENCRYPT=0
    jicofo:
      image: jitsi/jicofo:stable
      restart: unless-stopped
      volumes:
        - jitsi_jicofo:/config
    jvb:
      image: jitsi/jvb:stable
      restart: unless-stopped
      ports:
        - "10000:10000/udp"
      volumes:
        - jitsi_jvb:/config
  volumes:
    jitsi_web:
    jitsi_jicofo:
    jitsi_jvb:
links:
  home: https://jitsi.org
  docs: https://jitsi.github.io/handbook/docs/devops-guide/devops-guide-docker
