id: jitsi
name: Jitsi Meet
description: Self-hosted video conferencing — no account required, end-to-end encrypted
category: productivity
version_hint: "stable"
compose:
  services:
    prosody:
      image: jitsi/prosody:stable
      restart: unless-stopped
      volumes:
        - jitsi_prosody:/config
      environment:
        - XMPP_DOMAIN=meet.jitsi
        - XMPP_AUTH_DOMAIN=auth.meet.jitsi
        - XMPP_MUC_DOMAIN=muc.meet.jitsi
        - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
        - XMPP_GUEST_DOMAIN=guest.meet.jitsi
        - JICOFO_AUTH_USER=focus
        - JICOFO_AUTH_PASSWORD=${JITSI_JICOFO_PASSWORD}
        - JICOFO_COMPONENT_SECRET=${JITSI_JICOFO_COMPONENT_SECRET}
        - JVB_AUTH_USER=jvb
        - JVB_AUTH_PASSWORD=${JITSI_JVB_PASSWORD}
      networks:
        default: {}

    jicofo:
      image: jitsi/jicofo:stable
      restart: unless-stopped
      volumes:
        - jitsi_jicofo:/config
      environment:
        - XMPP_SERVER=prosody
        - XMPP_DOMAIN=meet.jitsi
        - XMPP_AUTH_DOMAIN=auth.meet.jitsi
        - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
        - JICOFO_AUTH_USER=focus
        - JICOFO_AUTH_PASSWORD=${JITSI_JICOFO_PASSWORD}
        - JICOFO_COMPONENT_SECRET=${JITSI_JICOFO_COMPONENT_SECRET}
      depends_on:
        - prosody
      networks:
        default: {}

    jvb:
      image: jitsi/jvb:stable
      restart: unless-stopped
      ports:
        - "10000:10000/udp"
      volumes:
        - jitsi_jvb:/config
      environment:
        - XMPP_SERVER=prosody
        - XMPP_AUTH_DOMAIN=auth.meet.jitsi
        - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
        - JVB_AUTH_USER=jvb
        - JVB_AUTH_PASSWORD=${JITSI_JVB_PASSWORD}
        - JVB_TCP_HARVESTER_DISABLED=true
      depends_on:
        - prosody
      networks:
        default: {}

    jitsi-web:
      image: jitsi/web:stable
      restart: unless-stopped
      ports:
        - "8083:80"
      volumes:
        - jitsi_web:/config
      environment:
        - XMPP_SERVER=prosody
        - XMPP_DOMAIN=meet.jitsi
        - XMPP_AUTH_DOMAIN=auth.meet.jitsi
        - XMPP_MUC_DOMAIN=muc.meet.jitsi
        - XMPP_GUEST_DOMAIN=guest.meet.jitsi
        - JICOFO_AUTH_USER=focus
        - JVB_TCP_HARVESTER_DISABLED=true
        - ENABLE_LETSENCRYPT=0
        - PUBLIC_URL=http://jitsi.local
        - VIRTUAL_HOST=jitsi.local
        - VIRTUAL_PORT=80
      depends_on:
        - prosody
      networks:
        default: {}
        vt-proxy:
          aliases:
            - jitsi

  volumes:
    jitsi_prosody:
    jitsi_jicofo:
    jitsi_jvb:
    jitsi_web:

  networks:
    vt-proxy:
      external: true

required_env:
  - key: JITSI_JICOFO_PASSWORD
    description: "Password for the Jicofo XMPP auth user (auto-generated)"
    generate: random_hex_32
  - key: JITSI_JICOFO_COMPONENT_SECRET
    description: "Secret for the Jicofo XMPP component connection (auto-generated)"
    generate: random_hex_32
  - key: JITSI_JVB_PASSWORD
    description: "Password for the JVB XMPP auth user (auto-generated)"
    generate: random_hex_32
links:
  home: https://jitsi.org
  docs: https://jitsi.github.io/handbook/docs/devops-guide/devops-guide-docker
