id: jitsi
name: Jitsi Meet
description: Self-hosted video conferencing — no account required, end-to-end encrypted
category: productivity
version_hint: "stable"
compose:
  services:
    jitsi-web:
      image: jitsi/web:stable
      restart: unless-stopped
      ports:
        - "8083:80"
        - "8445:443"
      volumes:
        - jitsi_web:/config
      environment:
        - PUBLIC_URL=http://localhost:8083
        - ENABLE_LETSENCRYPT=0
        - VIRTUAL_HOST=jitsi.local
        - VIRTUAL_PORT=80
      networks:
        default: {}
        vt-proxy:
          aliases:
            - jitsi
    jicofo:
      image: jitsi/jicofo:stable
      restart: unless-stopped
      volumes:
        - jitsi_jicofo:/config
    jvb:
      image: jitsi/jvb:stable
      restart: unless-stopped
      ports:
        - "10000:10000/udp"
      volumes:
        - jitsi_jvb:/config
  volumes:
    jitsi_web:
    jitsi_jicofo:
    jitsi_jvb:

  networks:
    vt-proxy:
      external: true

links:
  home: https://jitsi.org
  docs: https://jitsi.github.io/handbook/docs/devops-guide/devops-guide-docker
