id: llama-cpp
name: llama.cpp Server
description: High-performance LLM inference server with CUDA GPU acceleration
category: ai
version_hint: "latest"
icon: "🦙"
compose:
  services:
    llama-cpp:
      image: ghcr.io/ggml-org/llama.cpp:server-cuda
      restart: unless-stopped
      runtime: nvidia
      ports:
        - "8090:8080"
      volumes:
        - ~/.local/share/voidtower/models:/models:ro
        - ~/.cache/huggingface:/hf-cache:ro
      environment:
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=compute,utility
        - VIRTUAL_HOST=llama.local
        - VIRTUAL_PORT=8080
      entrypoint:
        - /bin/sh
        - -c
        - |
          echo "[llama.cpp] Scanning for models..."
          while true; do
            MODEL=$$(find /models /hf-cache -name "*.gguf" 2>/dev/null | head -1)
            if [ -n "$$MODEL" ]; then
              echo "[llama.cpp] Starting with model: $$MODEL"
              exec /app/llama-server \
                --model "$$MODEL" \
                --host 0.0.0.0 \
                --port 8080 \
                --n-gpu-layers 999 \
                --ctx-size 8192 \
                --batch-size 512 \
                --threads 4 \
                --cont-batching \
                --parallel 4
            fi
            echo "[llama.cpp] No .gguf found -- retrying in 15s..."
            sleep 15
          done
      extra_hosts:
        - "host.docker.internal:host-gateway"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      networks:
        default: {}
        vt-proxy:
          aliases:
            - llama-cpp
ai_integration:
  level: native
  description: "Odysseus uses llama.cpp as its primary local inference backend"
links:
  home: https://github.com/ggml-org/llama.cpp
  docs: https://github.com/ggml-org/llama.cpp/blob/master/examples/server/README.md
