id: matrix-synapse
name: Matrix Synapse
description: Self-hosted encrypted chat server — bridges to WhatsApp, Telegram, Discord
category: productivity
version_hint: "latest"
no_web_ui: true
compose:
  services:
    synapse:
      image: matrixdotorg/synapse:latest
      restart: unless-stopped
      entrypoint:
        - /bin/sh
        - -c
        - |
          if [ ! -f /data/homeserver.yaml ]; then
            /start.py generate
          fi
          exec /start.py
      ports:
        - "8448:8448"
        - "8008:8008"
      volumes:
        - synapse_data:/data
      environment:
        - SYNAPSE_SERVER_NAME=${MATRIX_SERVER_NAME}
        - SYNAPSE_REPORT_STATS=no
        - VIRTUAL_HOST=matrix.local
        - VIRTUAL_PORT=8008
      networks:
        default: {}
        vt-proxy:
          aliases:
            - matrix
  volumes:
    synapse_data:

  networks:
    vt-proxy:
      external: true

required_env:
  - key: MATRIX_SERVER_NAME
    description: "Matrix server domain used in user IDs like @user:domain — e.g. matrix.home"
    generate: ""
    default: "matrix.home"
links:
  home: https://matrix.org
  docs: https://element-hq.github.io/synapse/latest
