id: matrix-synapse
name: Matrix Synapse
description: Self-hosted encrypted chat server — bridges to WhatsApp, Telegram, Discord
category: productivity
version_hint: "latest"
no_web_ui: true
compose:
  services:
    synapse:
      image: matrixdotorg/synapse:latest
      restart: unless-stopped
      ports:
        - "8448:8448"
        - "8008:8008"
      volumes:
        - synapse_data:/data
      environment:
        - SYNAPSE_SERVER_NAME=matrix.home
        - SYNAPSE_REPORT_STATS=no
        - VIRTUAL_HOST=matrix.local
        - VIRTUAL_PORT=8008
      networks:
        default: {}
        vt-proxy:
          aliases:
            - matrix
  volumes:
    synapse_data:

  networks:
    vt-proxy:
      external: true

links:
  home: https://matrix.org
  docs: https://element-hq.github.io/synapse/latest
