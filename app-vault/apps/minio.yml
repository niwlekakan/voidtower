id: minio
name: MinIO
description: S3-compatible object storage
category: storage
icon: ""
version_hint: "latest"
web_port: 9001
compose:
  services:
    minio:
      image: minio/minio:latest
      restart: unless-stopped
      ports:
        - "9002:9000"
        - "9001:9001"
      volumes:
        - minio_data:/data
      environment:
        - MINIO_ROOT_USER=admin
        - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
        - MINIO_BROWSER_REDIRECT_URL=http://minio.local
        - VIRTUAL_HOST=minio.local
        - VIRTUAL_PORT=9001
      command: server /data --console-address ":9001"
      networks:
        default: {}
        vt-proxy:
          aliases:
            - minio
  volumes:
    minio_data:

  networks:
    vt-proxy:
      external: true

required_env:
  - key: MINIO_ROOT_PASSWORD
    description: "MinIO root password — minimum 8 characters (auto-generated)"
    generate: random_hex_16
links:
  home: https://min.io
  docs: https://min.io/docs
