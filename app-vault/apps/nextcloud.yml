id: nextcloud
name: Nextcloud
description: Self-hosted productivity platform
category: storage
version_hint: "latest"
compose:
  services:
    nextcloud:
      image: nextcloud:latest
      restart: unless-stopped
      ports:
        - "8081:80"
      volumes:
        - nextcloud_data:/var/www/html
      environment:
        - SQLITE_DATABASE=nextcloud
        - NEXTCLOUD_TRUSTED_DOMAINS=nextcloud.local
        - VIRTUAL_HOST=nextcloud.local
        - VIRTUAL_PORT=80
      networks:
        default: {}
        vt-proxy:
          aliases:
            - nextcloud
  volumes:
    nextcloud_data:
ai_integration:
  level: aware
  description: "Odysseus can read file metadata, calendar events, and contacts"
links:
  home: https://nextcloud.com
  docs: https://docs.nextcloud.com
