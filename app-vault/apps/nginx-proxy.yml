id: nginx-proxy
name: Nginx Proxy
description: Auto-configuring reverse proxy -- exposes Pi-hole, AdGuard, WireGuard and other apps behind clean virtual-host URLs
category: networking
version_hint: "latest"
no_web_ui: true
compose:
  services:
    nginx-proxy:
      image: nginxproxy/nginx-proxy:alpine
      restart: unless-stopped
      ports:
        # 8080/8443 are taken by the VoidTower AIO container's own bundled
        # proxy on TrueNAS — use 8070/8453 here to avoid a port collision.
        - "8070:80"
        - "8453:443"
      volumes:
        - /var/run/docker.sock:/tmp/docker.sock:ro
        # Bind-mounted so VoidTower proxy manager can write configs here directly
        - /var/lib/voidtower/nginx/conf.d:/etc/nginx/conf.d
        - nginx_certs:/etc/nginx/certs
        - nginx_vhost:/etc/nginx/vhost.d
        - nginx_html:/usr/share/nginx/html
      environment:
        - TRUST_DOWNSTREAM_PROXY=true
      networks:
        default: {}
        vt-proxy:
          aliases:
            - nginx
  volumes:
    nginx_certs:
    nginx_vhost:
    nginx_html:
  networks:
    vt-proxy:
      external: true
ai_integration:
  level: aware
  description: "Odysseus can read proxy routes and upstream health"
links:
  home: https://github.com/nginx-proxy/nginx-proxy
  docs: https://github.com/nginx-proxy/nginx-proxy/blob/main/README.md
