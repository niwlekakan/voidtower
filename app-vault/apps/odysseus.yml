id: odysseus
name: Odysseus
description: Self-hosted AI workspace — chat, autonomous agents, deep research, document editor
category: ai
version_hint: "latest"
icon: "🧠"
compose:
  services:
    odysseus:
      build:
        context: https://github.com/pewdiepie-archdaemon/odysseus.git#main
      restart: unless-stopped
      ports:
        - "7000:7000"
      volumes:
        - odysseus_data:/app/data
        - odysseus_chroma:/app/chroma
        # Persist HuggingFace model cache to host so models survive container rebuilds
        - ~/.cache/huggingface:/root/.cache/huggingface:rw
        # Also expose VoidTower managed models
        - ~/.local/share/voidtower/models:/models:rw
      environment:
        - ODYSSEUS_HOST=0.0.0.0
        - ODYSSEUS_PORT=7000
        - ODYSSEUS_DATA_DIR=/app/data
        - LLM_API_BASE=${LLM_API_BASE:-http://ollama:11434/v1}
        - LLM_MODEL=${LLM_MODEL:-default}
        - SEARXNG_BASE_URL=http://searxng:8080
        - VIRTUAL_HOST=odysseus.local
        - VIRTUAL_PORT=7000
        # Keep HuggingFace cache in the mounted path
        - HF_HOME=/root/.cache/huggingface
        # CUDA / GPU visibility for local embedding models (ChromaDB, sentence-transformers)
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      extra_hosts:
        - "host.docker.internal:host-gateway"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      networks:
        default: {}
        vt-proxy:
          aliases:
            - odysseus
  volumes:
    odysseus_data: {}
    odysseus_chroma: {}

  networks:
    vt-proxy:
      external: true

# VoidTower will block deployment if the system service is detected (port 7000 conflict).
# To use the Docker version instead, first remove the system service:
#   systemctl stop odysseus && systemctl disable odysseus
system_conflict_check: odysseus

ai_integration:
  level: native
  description: "This IS the AI — Odysseus is the VoidTower AI agent itself"
links:
  home: https://github.com/pewdiepie-archdaemon/odysseus
  docs: https://github.com/pewdiepie-archdaemon/odysseus/wiki
