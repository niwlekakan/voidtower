id: ollama
name: Ollama
description: Run large language models locally
category: ai
version_hint: "latest"
no_web_ui: true
compose:
  services:
    ollama:
      image: ollama/ollama:latest
      restart: unless-stopped
      ports:
        - "11434:11434"
      volumes:
        - ollama_data:/root/.ollama
        - ${HOME}/.local/share/voidtower/models:/vt-models:ro
      runtime: nvidia
      environment:
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=compute,utility
        - OLLAMA_VULKAN=1
        - VIRTUAL_HOST=ollama.local
        - VIRTUAL_PORT=11434
      devices:
        - /dev/dri:/dev/dri
      networks:
        default: {}
        vt-proxy:
          aliases:
            - ollama
  volumes:
    ollama_data:

  networks:
    vt-proxy:
      external: true

ai_integration:
  level: native
  description: "Odysseus can list, pull, delete, and query Ollama models directly"
links:
  home: https://ollama.com
  docs: https://github.com/ollama/ollama/blob/main/docs/api.md
