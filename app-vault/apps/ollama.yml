id: ollama
name: Ollama
description: Run large language models locally
category: ai
version_hint: "latest"
no_web_ui: true
compose:
  services:
    ollama:
      image: ollama/ollama:latest
      restart: unless-stopped
      ports:
        - "11434:11434"
      volumes:
        - ollama_data:/root/.ollama
        # Rewritten by VoidTower at deploy time: rewrite_voidtower_home_paths()
        # maps this to {data_dir}/models, then rewrite_host_bind_mounts() maps
        # that to the real host path on containerized installs (TrueNAS AIO).
        - ${HOME}/.local/share/voidtower/models:/vt-models:ro
      # runtime: nvidia is kept/stripped by VoidTower's detect_gpu() check —
      # works on bare-metal (local nvidia-smi) and TrueNAS (host Docker daemon's
      # nvidia runtime, via /var/run/docker.sock).
      runtime: nvidia
      environment:
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=compute,utility
        - OLLAMA_VULKAN=1
        - VIRTUAL_HOST=ollama.local
        - VIRTUAL_PORT=11434
      # Optional Intel/AMD VAAPI passthrough for Vulkan compute. Dropped by
      # VoidTower's strip_unavailable_devices() if /dev/dri doesn't exist on
      # the host (e.g. NVIDIA-only or virtualised hosts) — doesn't block deploy.
      devices:
        - /dev/dri:/dev/dri
      networks:
        default: {}
        vt-proxy:
          aliases:
            - ollama
  volumes:
    ollama_data:

  networks:
    vt-proxy:
      external: true

# VoidTower will block deployment if the system service is detected (port 11434 conflict).
# To use the Docker version instead, first remove the system service:
#   systemctl stop ollama && systemctl disable ollama
system_conflict_check: ollama

ai_integration:
  level: native
  description: "Odysseus can list, pull, delete, and query Ollama models directly"
links:
  home: https://ollama.com
  docs: https://github.com/ollama/ollama/blob/main/docs/api.md
