id: open-webui
name: Open WebUI
description: Feature-rich AI chat interface for Ollama and OpenAI-compatible APIs
category: ai
version_hint: "latest"
icon: "💬"
compose:
  services:
    open-webui:
      image: ghcr.io/open-webui/open-webui:main
      restart: unless-stopped
      ports:
        - "3000:8080"
      volumes:
        - open_webui_data:/app/backend/data
      environment:
        - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host-gateway:11434}
        - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-}
        - OPENAI_API_KEY=${OPENAI_API_KEY:-}
        - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme}
      extra_hosts:
        - "host-gateway:host-gateway"
  volumes:
    open_webui_data:
links:
  home: https://openwebui.com
  docs: https://docs.openwebui.com
