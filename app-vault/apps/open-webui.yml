id: open-webui
name: Open WebUI
description: Feature-rich AI chat interface for Ollama and OpenAI-compatible APIs
category: ai
version_hint: "latest"
icon: "💬"
compose:
  services:
    open-webui:
      image: ghcr.io/open-webui/open-webui:main
      restart: unless-stopped
      ports:
        - "3003:8080"
      volumes:
        - open_webui_data:/app/backend/data
      environment:
        - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
        - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-}
        - OPENAI_API_KEY=${OPENAI_API_KEY:-}
        - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-changeme}
        - VIRTUAL_HOST=chat.local
        - VIRTUAL_PORT=8080
      extra_hosts:
        - "host-gateway:host-gateway"
      networks:
        default: {}
        vt-proxy:
          aliases:
            - open-webui
  volumes:
    open_webui_data:

  networks:
    vt-proxy:
      external: true

ai_integration:
  level: native
  description: "Odysseus can read chat history and route queries through Open WebUI"
links:
  home: https://openwebui.com
  docs: https://docs.openwebui.com
