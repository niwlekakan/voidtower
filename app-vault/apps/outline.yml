id: outline
name: Outline
description: Team wiki and knowledge base — self-hosted Notion alternative
category: productivity
version_hint: "latest"
compose:
  services:
    outline:
      image: outlinewiki/outline:latest
      restart: unless-stopped
      ports:
        - "3004:3000"
      volumes:
        - outline_data:/var/lib/outline/data
      environment:
        - SECRET_KEY=${OUTLINE_SECRET_KEY}
        - UTILS_SECRET=${OUTLINE_UTILS_SECRET}
        - DATABASE_URL=postgres://outline:${OUTLINE_DB_PASSWORD}@postgres/outline
        - REDIS_URL=redis://redis:6379
        - URL=http://outline.local
        - PORT=3000
        - VIRTUAL_HOST=outline.local
        - VIRTUAL_PORT=3000
      networks:
        default: {}
        vt-proxy:
          aliases:
            - outline
    postgres:
      image: postgres:15
      restart: unless-stopped
      volumes:
        - outline_postgres:/var/lib/postgresql/data
      environment:
        - POSTGRES_USER=outline
        - POSTGRES_PASSWORD=${OUTLINE_DB_PASSWORD}
        - POSTGRES_DB=outline
    redis:
      image: redis:7
      restart: unless-stopped
  volumes:
    outline_data:
    outline_postgres:

  networks:
    vt-proxy:
      external: true

required_env:
  - key: OUTLINE_SECRET_KEY
    description: "Primary secret key for Outline sessions (auto-generated)"
    generate: random_hex_64
  - key: OUTLINE_UTILS_SECRET
    description: "Secondary utility secret for Outline (auto-generated)"
    generate: random_hex_64
  - key: OUTLINE_DB_PASSWORD
    description: "PostgreSQL password for Outline database (auto-generated)"
    generate: random_hex_32
links:
  home: https://www.getoutline.com
  docs: https://docs.getoutline.com/s/hosting
