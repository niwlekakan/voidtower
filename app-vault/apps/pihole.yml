id: pihole
name: Pi-hole
description: Network-wide ad blocker and DNS sinkhole
category: networking
icon: ""
version_hint: "latest"
compose:
  services:
    pihole:
      image: pihole/pihole:latest
      restart: unless-stopped
      # DNS ports mapped to 5353 to avoid conflicting with systemd-resolved
      # on development machines. On a dedicated server/TrueNAS, change 5353
      # back to 53 and point your router's DNS at this host.
      ports:
        - "5353:53/tcp"
        - "5353:53/udp"
        - "8180:80"
      cap_add:
        - NET_ADMIN
      volumes:
        - pihole_etc:/etc/pihole
        - pihole_dnsmasq:/etc/dnsmasq.d
      environment:
        - TZ=UTC
        - WEBPASSWORD=changeme
  volumes:
    pihole_etc:
    pihole_dnsmasq:
ai_integration:
  level: aware
  description: "Odysseus can read DNS query stats and manage blocklists"
links:
  home: https://pi-hole.net
  docs: https://docs.pi-hole.net
