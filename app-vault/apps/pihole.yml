id: pihole
name: Pi-hole
description: Network-wide ad blocker and DNS sinkhole
category: networking
icon: ""
version_hint: "latest"
compose:
  services:
    pihole:
      image: pihole/pihole:latest
      restart: unless-stopped
      # Port 53 may conflict with systemd-resolved on modern Linux.
      # If deploy fails with "address already in use", disable the stub:
      #   sudo systemctl disable --now systemd-resolved
      # or change the host-side port from 53 to 5353 here.
      ports:
        - "53:53/tcp"
        - "53:53/udp"
        - "8053:80"
      cap_add:
        - NET_ADMIN
      volumes:
        - pihole_etc:/etc/pihole
        - pihole_dnsmasq:/etc/dnsmasq.d
      environment:
        - TZ=UTC
        - WEBPASSWORD=changeme
  volumes:
    pihole_etc:
    pihole_dnsmasq:
ai_integration:
  level: aware
  description: "Odysseus can read DNS query stats and manage blocklists"
links:
  home: https://pi-hole.net
  docs: https://docs.pi-hole.net
