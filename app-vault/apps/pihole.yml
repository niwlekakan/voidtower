id: pihole
name: Pi-hole
web_port: 8180
web_path: /admin
description: Network-wide ad blocker and DNS sinkhole
category: networking
icon: ""
version_hint: "latest"
compose:
  services:
    pihole:
      # Updated to v6 (2025.x). Key v6 changes vs v5:
      #   - WEBPASSWORD          → FTLCONF_webserver_api_password
      #   - PIHOLE_DNS_          → FTLCONF_dns_upstreams (semicolon-separated)
      #   - /etc/dnsmasq.d volume no longer used by v6; remove it from existing
      #     installs with: docker volume rm pihole_dnsmasq
      #   - DNS is now served by FTL directly (no separate dnsmasq process)
      #   - The `dns:` service block is not needed in v6; FTL handles upstream
      #     resolution for blocklist downloads internally.
      image: pihole/pihole:latest
      restart: unless-stopped
      # DNS ports mapped to 5353 to avoid conflicting with systemd-resolved
      # on development machines. On a dedicated server/TrueNAS, change 5353
      # back to 53 and point your router's DNS at this host.
      ports:
        - "5353:53/tcp"
        - "5353:53/udp"
        - "8180:80"
      cap_add:
        - NET_ADMIN
      volumes:
        - pihole_etc:/etc/pihole
      environment:
        - TZ=UTC
        # v6 password env var (replaces WEBPASSWORD from v5)
        - FTLCONF_webserver_api_password=changeme
        # v6 DNS upstream format (replaces PIHOLE_DNS_1 / PIHOLE_DNS_2 from v5)
        - FTLCONF_dns_upstreams=1.1.1.1;8.8.8.8
        # nginx-proxy auto-discovery
        - VIRTUAL_HOST=pihole.local
        - VIRTUAL_PORT=80
      networks:
        default: {}
        vt-proxy:
          aliases:
            - pihole
  volumes:
    pihole_etc:
  networks:
    vt-proxy:
      external: true
ai_integration:
  level: aware
  description: "Odysseus can read DNS query stats and manage blocklists"
links:
  home: https://pi-hole.net
  docs: https://docs.pi-hole.net
  web_ui: /admin/
