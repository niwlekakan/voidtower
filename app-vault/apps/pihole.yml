id: pihole
name: Pi-hole
description: Network-wide ad blocker and DNS sinkhole
category: networking
icon: ""
version_hint: "latest"
compose:
  services:
    pihole:
      # Pinned to last stable v5 release — v6 renamed env vars and changed
      # the web server; update to 2025.x once v6 env vars are added here.
      image: pihole/pihole:2024.07.0
      restart: unless-stopped
      # Explicit DNS so gravity can download blocklists inside the container.
      dns:
        - 1.1.1.1
        - 8.8.8.8
      # DNS ports mapped to 5353 to avoid conflicting with systemd-resolved
      # on development machines. On a dedicated server/TrueNAS, change 5353
      # back to 53 and point your router's DNS at this host.
      ports:
        - "5353:53/tcp"
        - "5353:53/udp"
        - "8180:80"
      cap_add:
        - NET_ADMIN
      volumes:
        - pihole_etc:/etc/pihole
        - pihole_dnsmasq:/etc/dnsmasq.d
      environment:
        - TZ=UTC
        - WEBPASSWORD=changeme
        # nginx-proxy auto-discovery
        - VIRTUAL_HOST=pihole.local
        - VIRTUAL_PORT=80
      networks:
        default: {}
        vt-proxy:
          aliases:
            - pihole
  volumes:
    pihole_etc:
    pihole_dnsmasq:
  networks:
    vt-proxy:
      external: true
ai_integration:
  level: aware
  description: "Odysseus can read DNS query stats and manage blocklists"
links:
  home: https://pi-hole.net
  docs: https://docs.pi-hole.net
