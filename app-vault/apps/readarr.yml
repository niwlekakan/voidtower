id: readarr
name: Readarr
description: Book and audiobook collection manager — tracks authors and automatically downloads ebooks and audiobooks
category: downloads
version_hint: "develop"
compose:
  services:
    readarr:
      image: lscr.io/linuxserver/readarr:develop
      restart: unless-stopped
      ports:
        - "8787:8787"
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=Etc/UTC
        - VIRTUAL_HOST=readarr.local
        - VIRTUAL_PORT=8787
      volumes:
        - readarr_config:/config
        - /media/books:/books
        - /downloads:/downloads
      networks:
        default: {}
        vt-proxy:
          aliases:
            - readarr
  volumes:
    readarr_config:

  networks:
    vt-proxy:
      external: true

web_port: 8787
links:
  home: https://readarr.com
  docs: https://wiki.servarr.com/readarr
