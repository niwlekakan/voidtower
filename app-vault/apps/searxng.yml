id: searxng
name: SearXNG
description: Privacy-respecting metasearch engine — aggregates 70+ sources, no tracking
category: utilities
version_hint: "latest"
compose:
  services:
    searxng:
      image: searxng/searxng:latest
      restart: unless-stopped
      ports:
        - "8891:8080"
      volumes:
        - searxng_data:/etc/searxng
      environment:
        - SEARXNG_BASE_URL=http://search.local
        - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}
        - VIRTUAL_HOST=search.local
        - VIRTUAL_PORT=8080
      cap_drop:
        - ALL
      cap_add:
        - CHOWN
        - SETGID
        - SETUID
      logging:
        driver: "json-file"
        options:
          max-size: "1m"
          max-file: "1"
      networks:
        default: {}
        vt-proxy:
          aliases:
            - searxng
  volumes:
    searxng_data:

  networks:
    vt-proxy:
      external: true

links:
  home: https://searxng.github.io/searxng
  docs: https://docs.searxng.org
