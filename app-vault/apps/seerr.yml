id: seerr
name: Seerr
description: Media request and discovery tool for Jellyfin, Plex, and Emby — lets users browse and request movies and TV shows
category: media
version_hint: "latest"
compose:
  services:
    seerr:
      image: ghcr.io/seerr-team/seerr:latest
      restart: unless-stopped
      ports:
        - "5055:5055"
      environment:
        - LOG_LEVEL=debug
        - TZ=Etc/UTC
        - VIRTUAL_HOST=requests.local
        - VIRTUAL_PORT=5055
      volumes:
        - seerr_config:/app/config
      networks:
        default: {}
        vt-proxy:
          aliases:
            - seerr
  volumes:
    seerr_config:

  networks:
    vt-proxy:
      external: true

web_port: 5055
ai_integration:
  level: aware
  description: "Odysseus can check pending requests and approval queue"
links:
  home: https://github.com/seerr-team/seerr
  docs: https://docs.seerr.dev
