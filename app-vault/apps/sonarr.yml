id: sonarr
name: Sonarr
description: TV series collection manager — monitors RSS feeds and automatically downloads, sorts, and renames episodes
category: downloads
version_hint: "latest"
compose:
  services:
    sonarr:
      image: lscr.io/linuxserver/sonarr:latest
      restart: unless-stopped
      ports:
        - "8989:8989"
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=Etc/UTC
        - VIRTUAL_HOST=sonarr.local
        - VIRTUAL_PORT=8989
      volumes:
        - sonarr_config:/config
        - /media/tv:/tv
        - /downloads:/downloads
      networks:
        default: {}
        vt-proxy:
          aliases:
            - sonarr
  volumes:
    sonarr_config:

  networks:
    vt-proxy:
      external: true

web_port: 8989
ai_integration:
  level: aware
  description: "Odysseus can query series library, wanted episodes, and queue status"
links:
  home: https://sonarr.tv
  docs: https://wiki.servarr.com/sonarr
