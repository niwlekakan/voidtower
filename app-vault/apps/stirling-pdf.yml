id: stirling-pdf
name: Stirling PDF
description: Locally hosted PDF manipulation tools — merge, split, convert
category: productivity
icon: ""
version_hint: "latest"
compose:
  services:
    stirling-pdf:
      image: stirlingtools/stirling-pdf:latest
      restart: unless-stopped
      ports:
        - "8484:8080"
      volumes:
        - stirling_data:/usr/share/tessdata
        - stirling_configs:/configs
      environment:
        - DOCKER_ENABLE_SECURITY=false
        - VIRTUAL_HOST=pdf.local
        - VIRTUAL_PORT=8080
      networks:
        default: {}
        vt-proxy:
          aliases:
            - stirling-pdf
  volumes:
    stirling_data: {}
    stirling_configs: {}

  networks:
    vt-proxy:
      external: true

links:
  home: https://github.com/Stirling-Tools/Stirling-PDF
