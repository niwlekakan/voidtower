id: uptime-kuma
name: Uptime Kuma
description: Self-hosted monitoring tool
category: monitoring
version_hint: "latest"
compose:
  services:
    uptime-kuma:
      image: louislam/uptime-kuma:latest
      restart: unless-stopped
      ports:
        - "3006:3001"
      volumes:
        - uptime_kuma_data:/app/data
      environment:
        - VIRTUAL_HOST=uptime.local
        - VIRTUAL_PORT=3001
      networks:
        default: {}
        vt-proxy:
          aliases:
            - uptime-kuma
  volumes:
    uptime_kuma_data:
ai_integration:
  level: aware
  description: "Odysseus can read uptime status, incidents, and monitor health"
links:
  home: https://uptime.kuma.pet
  docs: https://github.com/louislam/uptime-kuma/wiki
