id: vaultwarden
name: Vaultwarden
description: Unofficial Bitwarden-compatible server
category: security
version_hint: "latest"
compose:
  services:
    vaultwarden:
      image: vaultwarden/server:latest
      restart: unless-stopped
      ports:
        - "8085:80"
      volumes:
        - vaultwarden_data:/data
      environment:
        - WEBSOCKET_ENABLED=true
        - SIGNUPS_ALLOWED=false
        - DOMAIN=http://vault.local
        - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN}
        - VIRTUAL_HOST=vault.local
        - VIRTUAL_PORT=80
      networks:
        default: {}
        vt-proxy:
          aliases:
            - vaultwarden
  volumes:
    vaultwarden_data:

  networks:
    vt-proxy:
      external: true

required_env:
  - key: VAULTWARDEN_ADMIN_TOKEN
    description: "Token to access the /admin page (auto-generated)"
    generate: random_hex_32

links:
  home: https://github.com/dani-garcia/vaultwarden
  docs: https://github.com/dani-garcia/vaultwarden/wiki
  web_ui: /
