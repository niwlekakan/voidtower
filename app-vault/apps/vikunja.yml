id: vikunja
name: Vikunja
description: Self-hosted project management and to-do app — Trello/Jira alternative
category: productivity
version_hint: "latest"
compose:
  services:
    vikunja:
      image: vikunja/vikunja:latest
      restart: unless-stopped
      ports:
        - "3456:3456"
      volumes:
        - vikunja_data:/app/vikunja/files
      environment:
        - VIKUNJA_DATABASE_TYPE=sqlite
        - VIKUNJA_SERVICE_JWTSECRET=${VIKUNJA_JWT_SECRET}
        - VIKUNJA_SERVICE_FRONTENDURL=http://tasks.local
        - VIRTUAL_HOST=tasks.local
        - VIRTUAL_PORT=3456
      networks:
        default: {}
        vt-proxy:
          aliases:
            - vikunja
  volumes:
    vikunja_data:

  networks:
    vt-proxy:
      external: true

required_env:
  - key: VIKUNJA_JWT_SECRET
    description: "JWT signing secret for Vikunja sessions (auto-generated)"
    generate: random_hex_32
links:
  home: https://vikunja.io
  docs: https://vikunja.io/docs
