id: wireguard-easy
name: WireGuard Easy
description: Easiest way to set up WireGuard VPN with a web UI for managing peers
category: networking
version_hint: "latest"
web_port: 51821
compose:
  services:
    wg-easy:
      image: ghcr.io/wg-easy/wg-easy:latest
      restart: unless-stopped
      cap_add:
        - NET_ADMIN
        - SYS_MODULE
      sysctls:
        - net.ipv4.ip_forward=1
        - net.ipv4.conf.all.src_valid_mark=1
      ports:
        - "51820:51820/udp"
        - "51821:51821/tcp"
      volumes:
        - wg_easy_data:/etc/wireguard
      environment:
        - WG_HOST=your-server-ip
        # bcrypt hash of "changeme" — replace before going to production.
        # Generate your own: docker run --rm ghcr.io/wg-easy/wg-easy wgpw YOUR_PASSWORD
        - PASSWORD_HASH=$$2b$$10$$WV8eOBXELDNwZtGNRZKoEupooqgmOX2QUL4TXhpLsBkiapdP7cm/S
        # Route VPN client DNS through Pi-hole on the shared vt-proxy network.
        # Switch to adguard if using AdGuard Home instead of Pi-hole.
        - WG_DEFAULT_DNS=pihole
        - VIRTUAL_HOST=wireguard.local
        - VIRTUAL_PORT=51821
      networks:
        default: {}
        vt-proxy:
          aliases:
            - wireguard
  volumes:
    wg_easy_data:
  networks:
    vt-proxy:
      external: true
links:
  home: https://github.com/wg-easy/wg-easy
  docs: https://github.com/wg-easy/wg-easy/blob/master/README.md
