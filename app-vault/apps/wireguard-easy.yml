id: wireguard-easy
name: WireGuard Easy
description: Easiest way to set up WireGuard VPN with a web UI for managing peers
category: networking
version_hint: "latest"
compose:
  services:
    wg-easy:
      image: ghcr.io/wg-easy/wg-easy:latest
      restart: unless-stopped
      cap_add:
        - NET_ADMIN
        - SYS_MODULE
      sysctls:
        - net.ipv4.ip_forward=1
        - net.ipv4.conf.all.src_valid_mark=1
      ports:
        - "51820:51820/udp"
        - "51821:51821/tcp"
      volumes:
        - wg_easy_data:/etc/wireguard
      environment:
        - WG_HOST=your-server-ip
        - PASSWORD=changeme
        - WG_DEFAULT_DNS=1.1.1.1
  volumes:
    wg_easy_data:
links:
  home: https://github.com/wg-easy/wg-easy
  docs: https://github.com/wg-easy/wg-easy/blob/master/README.md
