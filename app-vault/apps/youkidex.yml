id: youkidex
name: YoukiDex (Android Desktop)
description: YoukiDEX Android desktop-experience overlay — floating dock, freeform windows, and app drawer running inside a redroid Android 12 container, mirrored to the browser via noVNC.
category: vm
version_hint: "12.0.0"
icon: "🤖"
tags: [android, vm, desktop, launcher, overlay]
compose:
  services:
    redroid:
      image: redroid/redroid:12.0.0-latest
      restart: unless-stopped
      privileged: true
      expose:
        - "5555"
      volumes:
        - youkidex_data:/data
      environment:
        - ro.product.cpu.abilist=x86_64,arm64-v8a
        - ro.build.enable_freeform_support=1
        - ro.sf.lcd_density=213
      networks:
        default: {}
        vt-proxy:
          aliases:
            - youkidex-android
    scrcpy-web:
      image: accetto/ubuntu-vnc-xfce-chromium-g3:latest
      restart: unless-stopped
      ports:
        - "8890:6080"
      environment:
        - VIRTUAL_HOST=youkidex.local
        - VIRTUAL_PORT=6080
      depends_on:
        - redroid
      networks:
        default: {}
        vt-proxy:
          aliases:
            - youkidex-web
  volumes:
    youkidex_data:
  networks:
    vt-proxy:
      external: true
setup_notes: |
  After deploying, sideload YoukiDEX via ADB:
    adb connect localhost:5555
    adb install YoukiDex-v2.7.apk
  Then grant required permissions:
    adb shell appops set com.youki.youkidex SYSTEM_ALERT_WINDOW allow
    adb shell settings put secure enabled_accessibility_services com.youki.youkidex/.service.YoukiDexAccessibilityService
    adb shell pm grant com.youki.youkidex android.permission.WRITE_SECURE_SETTINGS
  Access the Android screen at http://localhost:8890 or http://youkidex.local via nginx-proxy.
links:
  home: https://github.com/mrYouki/YoukiDex-Android-Desktop
  web_ui: http://localhost:8890
  docs: https://github.com/mrYouki/YoukiDex-Android-Desktop/blob/main/README.md
