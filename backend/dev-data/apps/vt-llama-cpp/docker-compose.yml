services:
  llama-cpp:
    deploy:
      resources:
        reservations:
          devices:
          - capabilities:
            - gpu
            count: all
            driver: nvidia
    entrypoint:
    - /bin/sh
    - -c
    - |
      echo "[llama.cpp] Scanning for models..."
      while true; do
        MODEL=$$(find /models /hf-cache -name "*.gguf" 2>/dev/null | head -1)
        if [ -n "$$MODEL" ]; then
          echo "[llama.cpp] Starting with model: $$MODEL"
          exec /app/llama-server \
            --model "$$MODEL" \
            --host 0.0.0.0 \
            --port 8080 \
            --n-gpu-layers 999 \
            --ctx-size 8192 \
            --batch-size 512 \
            --threads 4 \
            --cont-batching \
            --parallel 4
        fi
        echo "[llama.cpp] No .gguf found -- retrying in 15s..."
        sleep 15
      done
    environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    extra_hosts:
    - host.docker.internal:host-gateway
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    ports:
    - 8080:8080
    restart: unless-stopped
    runtime: nvidia
    volumes:
    - ~/.local/share/voidtower/models:/models:ro
    - ~/.cache/huggingface:/hf-cache:ro
