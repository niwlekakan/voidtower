services:
  odysseus:
    build:
      context: https://github.com/pewdiepie-archdaemon/odysseus.git#main
    deploy:
      resources:
        reservations:
          devices:
          - capabilities:
            - gpu
            count: all
            driver: nvidia
    environment:
    - ODYSSEUS_HOST=0.0.0.0
    - ODYSSEUS_PORT=7000
    - ODYSSEUS_DATA_DIR=/app/data
    - LLM_API_BASE=${LLM_API_BASE:-http://host.docker.internal:8080/v1}
    - LLM_MODEL=${LLM_MODEL:-default}
    - HF_HOME=/root/.cache/huggingface
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 7000:7000
    restart: unless-stopped
    volumes:
    - odysseus_data:/app/data
    - odysseus_chroma:/app/chroma
    - ~/.cache/huggingface:/root/.cache/huggingface:rw
    - ~/.local/share/voidtower/models:/models:rw
volumes:
  odysseus_chroma: {}
  odysseus_data: {}
