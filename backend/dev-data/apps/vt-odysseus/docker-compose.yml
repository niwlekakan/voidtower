services:
  odysseus:
    build:
      context: https://github.com/niwlekakan/odysseus.git#odysseus-voidlink
    ports:
      - "${ODYSSEUS_BIND:-127.0.0.1}:${ODYSSEUS_PORT:-7000}:7000"
    volumes:
      - odysseus_data:/app/data
      - odysseus_logs:/app/logs
      - odysseus_huggingface:/app/.cache/huggingface
      - odysseus_local:/app/.local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # AI provider â€” defaults to Ollama on the Docker host
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LLM_HOST=${LLM_HOST:-}
      - LLM_HOSTS=${LLM_HOSTS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      # Voidwatch â€” connects Odysseus back to this VoidTower instance
      - VOIDTOWER_URL=${VOIDTOWER_URL:-http://host.docker.internal:8743}
      - VOIDTOWER_TOKEN=${VOIDWATCH_TOKEN:-}
      - VOIDWATCH_WEBHOOK_SECRET=${VOIDWATCH_WEBHOOK_SECRET:-}
      # Internal services
      - SEARXNG_INSTANCE=http://searxng:8080
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/app.db}
      # Auth
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - ODYSSEUS_ADMIN_USER=${ODYSSEUS_ADMIN_USER:-admin}
      - ODYSSEUS_ADMIN_PASSWORD=${ODYSSEUS_ADMIN_PASSWORD:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      # Worker settings
      - ODYSSEUS_INPROCESS_POLLERS=${ODYSSEUS_INPROCESS_POLLERS:-1}
      - ODYSSEUS_INPROCESS_TASKS=${ODYSSEUS_INPROCESS_TASKS:-1}
      - ODYSSEUS_SCRIPT_HOST=${ODYSSEUS_SCRIPT_HOST:-localhost}
      - CLEANUP_INTERVAL_HOURS=${CLEANUP_INTERVAL_HOURS:-24}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    depends_on:
      searxng:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped

  chromadb:
    image: docker.io/chromadb/chroma:latest
    ports:
      - "${CHROMADB_BIND:-127.0.0.1}:8100:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:2026.5.31-7159b8aed
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - searxng_data:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
      - SEARXNG_SECRET=${SEARXNG_SECRET:-}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/', timeout=5).read(1)\""]
      interval: 5s
      timeout: 6s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  ntfy:
    image: docker.io/binwiederhier/ntfy
    command: serve
    ports:
      - "${NTFY_BIND:-127.0.0.1}:8091:80"
    volumes:
      - ntfy_cache:/var/cache/ntfy
    environment:
      - NTFY_BASE_URL=${NTFY_BASE_URL:-http://localhost:8091}
    restart: unless-stopped

volumes:
  odysseus_data: {}
  odysseus_logs: {}
  odysseus_huggingface: {}
  odysseus_local: {}
  chromadb_data: {}
  searxng_data: {}
  ntfy_cache: {}
