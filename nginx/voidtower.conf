# Static fallback — Docker entrypoint.sh rewrites this file at runtime
# with TLS support if a cert is available. On bare-metal the install
# script writes its own conf to /etc/nginx/conf.d/voidtower.conf.
server {
    listen 80;
    server_name _;
    location / {
        proxy_pass http://127.0.0.1:8743;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        client_max_body_size 100m;
    }
}
